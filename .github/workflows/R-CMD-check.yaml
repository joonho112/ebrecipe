# Workflow derived from the canonical r-lib/actions standard-check matrix
# (`usethis::use_github_action_check_standard()` output). 9-cell matrix
# covers macOS / Linux / Windows × R-release / R-devel / R-oldrel-1.
# See ../inst/LOCKED_FILES.md for the engine-freeze policy this CI guards.

name: R-CMD-check

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

permissions: read-all

jobs:
  R-CMD-check:
    runs-on: ${{ matrix.config.os }}

    name: ${{ matrix.config.os }} (${{ matrix.config.r }})

    strategy:
      fail-fast: false
      matrix:
        config:
          # Linux — primary CRAN platform; all three R lines hard-fail
          - {os: ubuntu-latest,  r: 'devel',    http-user-agent: 'release'}
          - {os: ubuntu-latest,  r: 'release'}
          - {os: ubuntu-latest,  r: 'oldrel-1'}
          # macOS — apple-silicon runners; release + devel + oldrel-1
          - {os: macos-latest,   r: 'devel',    http-user-agent: 'release'}
          - {os: macos-latest,   r: 'release'}
          - {os: macos-latest,   r: 'oldrel-1'}
          # Windows — UCRT toolchain; release + devel + oldrel-1
          - {os: windows-latest, r: 'devel',    http-user-agent: 'release'}
          - {os: windows-latest, r: 'release'}
          - {os: windows-latest, r: 'oldrel-1'}

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.config.r }}
          http-user-agent: ${{ matrix.config.http-user-agent }}
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::rcmdcheck
          needs: check

      - uses: r-lib/actions/check-r-package@v2
        with:
          upload-snapshots: true
          build_args: 'c("--no-manual","--compact-vignettes=gs+qpdf")'
          args: 'c("--no-manual", "--as-cran")'
          error-on: '"warning"'
